<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#17243b" />
    <meta name="description" content="Hatch eggs, meet Pokémon, and fill a cosy little Pokédex." />
    <title>Pocket Hatchery</title>
    <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin />
    <link rel="preconnect" href="https://pokeapi.co" crossorigin />
    <link rel="dns-prefetch" href="//archives.bulbagarden.net" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell" data-theme="field">
      <header class="topbar">
        <button class="brand" type="button" data-tab="home" aria-label="Go to the hatchery">
          <span class="brand-egg" aria-hidden="true"><span></span></span>
          <span class="brand-copy"><strong>Pocket Hatchery</strong><small>egg-and-pocket journal</small></span>
        </button>

        <nav class="primary-nav" aria-label="Main navigation">
          <button class="nav-button is-active" type="button" data-tab="home">Home</button>
          <button class="nav-button" type="button" data-tab="pokedex">Pokédex</button>
          <button class="nav-button" type="button" data-tab="pc">PC</button>
          <button class="nav-button" type="button" data-tab="bag">Bag</button>
          <button class="nav-button" type="button" data-tab="competitions">Competitions</button>
          <button class="nav-button" type="button" data-tab="mart">Pokémart</button>
          <button class="nav-button" type="button" data-tab="settings">Settings</button>
        </nav>

        <div class="account-metrics" aria-label="Player status">
          <span class="metric-chip metric-money"><span aria-hidden="true">◉</span><strong id="money-display">₽0</strong></span>
          <span class="metric-chip metric-streak"><span aria-hidden="true">▣</span><strong id="streak-display">0 day streak</strong></span>
        </div>

        <button class="menu-button" id="menu-button" type="button" aria-expanded="false" aria-controls="mobile-nav">
          <span></span><span></span><span></span><span class="sr-only">Open navigation</span>
        </button>
      </header>

      <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile navigation" hidden>
        <button type="button" data-tab="home">Home</button>
        <button type="button" data-tab="pokedex">Pokédex</button>
        <button type="button" data-tab="pc">PC</button>
        <button type="button" data-tab="bag">Bag</button>
        <button type="button" data-tab="competitions">Competitions</button>
        <button type="button" data-tab="mart">Pokémart</button>
        <button type="button" data-tab="settings">Settings</button>
      </nav>

      <main id="view" class="view" tabindex="-1" aria-live="polite"></main>

      <footer class="statusbar">
        <span><i class="status-light"></i><span id="api-status">records awake</span></span>
        <span>▣ <span>local nest</span></span>
        <button id="help-button" type="button">? <span>hatchery guide</span></button>
      </footer>

      <div id="modal-root"></div>
      <div id="toast-root" class="toast-root" aria-live="assertive"></div>
    </div>
    <noscript>This game needs JavaScript enabled to keep your local hatchery nest.</noscript>
    <script src="compatibility.js" defer></script>
    <script src="profile-features.js" defer></script>
    <script src="storage.js" defer></script>
    <script src="api-client.js" defer></script>
    <script src="modal-manager.js" defer></script>
    <script src="competition-engine.js" defer></script>
    <script src="state-schema.js" defer></script>
    <script src="catch-engine.js" defer></script>
    <script src="field-notes.js" defer></script>
    <script src="legendary-items.js" defer></script>
    <script src="egg-predators.js" defer></script>
    <script src="shop-items.js" defer></script>
    <script src="app.js" defer></script>
  </body>
</html>
